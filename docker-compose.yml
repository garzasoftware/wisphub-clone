version: '3.8'

services:
  postgres:
      image: postgres:15-alpine
          container_name: wisphub_postgres
              environment:
                    POSTGRES_DB: wisphub_db
                          POSTGRES_USER: wisphub_user
                                POSTGRES_PASSWORD: wisphub_password
                                    volumes:
                                          - postgres_data:/var/lib/postgresql/data
                                                - ./backend/src/database/init.sql:/docker-entrypoint-initdb.d/init.sql
                                                    ports:
                                                          - "5432:5432"
                                                              networks:
                                                                    - wisphub_network
                                                                        healthcheck:
                                                                              test: ["CMD-SHELL", "pg_isready -U wisphub_user -d wisphub_db"]
                                                                                    interval: 10s
                                                                                          timeout: 5s
                                                                                                retries: 5

                                                                                                  redis:
                                                                                                      image: redis:7-alpine
                                                                                                          container_name: wisphub_redis
                                                                                                              ports:
                                                                                                                    - "6379:6379"
                                                                                                                        volumes:
                                                                                                                              - redis_data:/data
                                                                                                                                  networks:
                                                                                                                                        - wisphub_network
                                                                                                                                            healthcheck:
                                                                                                                                                  test: ["CMD", "redis-cli", "ping"]
                                                                                                                                                        interval: 10s
                                                                                                                                                              timeout: 5s
                                                                                                                                                                    retries: 5
                                                                                                                                                                    
                                                                                                                                                                      backend:
                                                                                                                                                                          build:
                                                                                                                                                                                context: ./backend
                                                                                                                                                                                      dockerfile: Dockerfile
                                                                                                                                                                                          container_name: wisphub_backend
                                                                                                                                                                                              environment:
                                                                                                                                                                                                    NODE_ENV: production
                                                                                                                                                                                                          PORT: 3001
                                                                                                                                                                                                                DB_HOST: postgres
                                                                                                                                                                                                                      DB_PORT: 5432
                                                                                                                                                                                                                            DB_NAME: wisphub_db
                                                                                                                                                                                                                                  DB_USER: wisphub_user
                                                                                                                                                                                                                                        DB_PASSWORD: wisphub_password
                                                                                                                                                                                                                                              REDIS_HOST: redis
                                                                                                                                                                                                                                                    REDIS_PORT: 6379
                                                                                                                                                                                                                                                          JWT_SECRET: your_jwt_secret_here
                                                                                                                                                                                                                                                                JWT_EXPIRES_IN: 7d
                                                                                                                                                                                                                                                                    ports:
                                                                                                                                                                                                                                                                          - "3001:3001"
                                                                                                                                                                                                                                                                              depends_on:
                                                                                                                                                                                                                                                                                    postgres:
                                                                                                                                                                                                                                                                                            condition: service_healthy
                                                                                                                                                                                                                                                                                                  redis:
                                                                                                                                                                                                                                                                                                          condition: service_healthy
                                                                                                                                                                                                                                                                                                              volumes:
                                                                                                                                                                                                                                                                                                                    - ./backend/uploads:/app/uploads
                                                                                                                                                                                                                                                                                                                        networks:
                                                                                                                                                                                                                                                                                                                              - wisphub_network
                                                                                                                                                                                                                                                                                                                                  restart: unless-stopped
                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                    frontend:
                                                                                                                                                                                                                                                                                                                                        build:
                                                                                                                                                                                                                                                                                                                                              context: ./frontend
                                                                                                                                                                                                                                                                                                                                                    dockerfile: Dockerfile
                                                                                                                                                                                                                                                                                                                                                        container_name: wisphub_frontend
                                                                                                                                                                                                                                                                                                                                                            environment:
                                                                                                                                                                                                                                                                                                                                                                  VITE_API_URL: http://localhost:3001
                                                                                                                                                                                                                                                                                                                                                                      ports:
                                                                                                                                                                                                                                                                                                                                                                            - "3000:80"
                                                                                                                                                                                                                                                                                                                                                                                depends_on:
                                                                                                                                                                                                                                                                                                                                                                                      - backend
                                                                                                                                                                                                                                                                                                                                                                                          networks:
                                                                                                                                                                                                                                                                                                                                                                                                - wisphub_network
                                                                                                                                                                                                                                                                                                                                                                                                    restart: unless-stopped
                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                    volumes:
                                                                                                                                                                                                                                                                                                                                                                                                      postgres_data:
                                                                                                                                                                                                                                                                                                                                                                                                        redis_data:
                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                        networks:
                                                                                                                                                                                                                                                                                                                                                                                                          wisphub_network:
                                                                                                                                                                                                                                                                                                                                                                                                              driver: bridge
